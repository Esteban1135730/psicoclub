version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: psicoclub-db
    environment:
      POSTGRES_USER: psicoclub
      POSTGRES_PASSWORD: psicoclub
      POSTGRES_DB: psicoclub
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: psicoclub-backend
    environment:
      NODE_ENV: production
      PORT: 4000
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: psicoclub
      POSTGRES_PASSWORD: psicoclub
      POSTGRES_DB: psicoclub
    depends_on:
      - db
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: psicoclub-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://backend:4000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data:

